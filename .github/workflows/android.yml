name: React Native Android CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:   # allows manual trigger

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2️⃣ Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # 3️⃣ Install npm dependencies
      - name: Install dependencies
        run: npm install

      # 4️⃣ Setup Java
      - name: Setup Java JDK
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # 5️⃣ Ensure Android SDK build tools are installed
      - name: Install Android SDK build tools
        run: |
          mkdir -p $ANDROID_SDK_ROOT
          yes | sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      # 6️⃣ Make Gradle wrapper executable
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # 7️⃣ Build Debug APK
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      # 8️⃣ Upload Debug APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: react-native-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # 9️⃣ Build Release APK
      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease

      # 🔟 Upload Release APK
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: react-native-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk